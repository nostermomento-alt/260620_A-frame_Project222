<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>A-Frame OBJ模型加载</title>
    <!-- 1. 引入A-Frame核心库 -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- 2. 引入aframe-extras的加载器组件 -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.loaders.min.js"></script>
  </head>
  <body>
    <!-- 3. 场景配置：背景颜色改为黑色 -->
    <a-scene background="color: #000000" renderer="colorManagement: true;">
      
      <!-- === 灯光系统（为您模型打光） === -->
      <!-- 环境光：提供基础均匀照明，避免全黑 -->
      <a-entity light="type: ambient; color: #FFFFFF; intensity: 0.6;"></a-entity>
      
      <!-- 主光源：方向光，产生立体感和阴影（调整角度照亮模型正面） -->
      <a-entity light="type: directional; color: #FFFFFF; intensity: 1.2;" 
                position="2 5 3"></a-entity>
      
      <!-- 背光/补光：从背面补充，减少死黑区域 -->
      <a-entity light="type: directional; color: #FFF0E0; intensity: 0.5;" 
                position="-3 1 -5"></a-entity>

      <!-- === 加载OBJ模型 === -->
      <!-- obj-model组件同时需要 .obj 和 .mtl 文件路径 -->
      <a-entity 
        obj-model="obj: url(260620testing.obj); mtl: url(260620testing.mtl)"
        scale="0.5 0.5 0.5"   <!-- 调整模型大小，请根据实际模型修改 -->
        position="0 0 -3"     <!-- 调整模型在场景中的位置 -->
        rotation="0 30 0"     <!-- 初始旋转角度 -->
      ></a-entity>

      <!-- 相机：设置到合适位置观察模型 -->
      <a-camera position="0 0 4"></a-camera>
      
    </a-scene>
  </body>
</html>
